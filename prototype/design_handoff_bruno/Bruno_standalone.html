document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

,'2160p HEVC Dolby Vision'];\n  AUDIOS = ['English · AAC 5.1','English · DTS-HD MA 5.1','English · TrueHD Atmos 7.1','Original · FLAC 2.0'];\n  SUBS = ['English (SRT)','English, French (PGS)','English SDH','None'];\n  MOVIE_CR = ['PG-13','R','PG','R'];\n\n  get accent(){ return this.props.accent || '#A1CCE0'; }\n\n  hash(str){ let h=0; str=''+str; for(let i=0;i<str.length;i++){ h=(h*31+str.charCodeAt(i))>>>0; } return h; }\n  fmt(min){ return Math.floor(min/60)+'h '+(min%60)+'m'; }\n  rng(seed){ let t=seed>>>0; return ()=>{ t+=0x6D2B79F5; let r=Math.imul(t^t>>>15,1|t); r^=r+Math.imul(r^r>>>7,61|r); return ((r^r>>>14)>>>0)/4294967296; }; }\n  shuf(arr,rnd){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(rnd()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }\n  initials(name){ return name.split(' ').filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase(); }\n  endsAt(min){ const d=new Date(Date.now()+min*60000); let h=d.getHours(), ap=h>=12?'PM':'AM'; h=h%12||12; const mm=(''+d.getMinutes()).padStart(2,'0'); return 'Ends at '+h+':'+mm+' '+ap; }\n  crit(t){ return 70+(this.hash('c'+t)%30); }\n  mediaInfo(t){ const h=this.hash('m'+t); return { video:this.VIDEOS[h%4], audio:this.AUDIOS[(h>>>2)%4], subs:this.SUBS[(h>>>4)%4] }; }\n\n  bgFor(t){ const [a,b]=this.GRADS[this.hash(t)%this.GRADS.length]; return `radial-gradient(120% 95% at 76% 14%, rgba(255,255,255,.14), rgba(255,255,255,0) 52%), radial-gradient(90% 130% at 12% 105%, rgba(0,0,0,.55), transparent 55%), linear-gradient(150deg, ${a} 0%, ${b} 100%)`; }\n  dirBg(name){ return `radial-gradient(100% 70% at 50% -10%, rgba(255,255,255,.12), transparent 60%), linear-gradient(160deg, #3c4267 0%, #1d2034 100%)`; }\n  dirAvatar(name){ const hues=[['#849396','#4E433D'],['#A1CCE0','#3c4267'],['#9b8f7e','#4E433D'],['#6f8a8f','#23303a'],['#7e6f86','#2c2435']]; const [a,b]=hues[this.hash(name)%hues.length]; return `linear-gradient(150deg, ${a}, ${b})`; }\n\n  mv(f){ return { id:f.t, title:f.t, meta:f.y+' · '+this.fmt(f.m), bg:this.bgFor(f.t), showBottom:true, z:'1', tf:'none', fx:'0 6px 18px rgba(0,0,0,.4)', _f:f, onClick:()=>this.openDetail(f) }; }\n  sv(sh){ const n=sh.seasons.length; const yr=sh.ys+((sh.ye&&sh.ye!==sh.ys)?'–'+sh.ye:''); return { id:sh.t, title:sh.t, meta:n+' Season'+(n>1?'s':'')+' · '+yr, bg:this.bgFor(sh.t), showBottom:true, hasBadge:true, badge:'Series', z:'1', tf:'none', fx:'0 6px 18px rgba(0,0,0,.4)', _show:sh, onClick:()=>this.openDetail(sh) }; }\n\n  directors(){ const map={}; this.FILMS.forEach(f=>{ (map[f.d]=map[f.d]||[]).push(f); }); return Object.keys(map).map(d=>({d,films:map[d]})).sort((a,b)=>b.films.length-a.films.length); }\n  studios(){ const map={}; this.FILMS.forEach(f=>{ (map[f.s]=map[f.s]||[]).push(f); }); return Object.keys(map).map(s=>({s,films:map[s]})).sort((a,b)=>b.films.length-a.films.length); }\n\n  epsFor(show,seasonN){\n    const real=this.EPISODES[show.t+' S'+seasonN];\n    const cnt=(show.seasons.find(s=>s.n===seasonN)||{eps:10}).eps;\n    const out=[];\n    for(let i=1;i<=cnt;i++){\n      const rd=real&&real[i-1];\n      const title=rd?rd.t:'Episode '+i;\n      const rt=rd&&rd.m?rd.m:(42+this.hash(show.t+seasonN+'l'+i)%16);\n      const rat=rd&&rd.r?rd.r:(Math.max(6.5,show.r-1.2+(this.hash(show.t+seasonN+'r'+i)%14)/10));\n      const watched=(seasonN===1&&i<3);\n      const prog=(seasonN===1&&i===3)?'42%':null;\n      out.push({ num:i, title, m:rt, rat,\n        numTitle:i+'. '+title,\n        meta:rt+'m  ·  ★ '+(typeof rat==='number'?rat.toFixed(1):rat)+'  ·  '+this.endsAt(rt),\n        blurb:rd?rd.o:'', hasBlurb:!!(rd&&rd.o), bg:this.bgFor(show.t+' '+seasonN+'x'+i),\n        watched, progress:prog, hasProgress:!!prog, onPlay:()=>{} });\n    }\n    return out;\n  }\n\n  exploreGen(key, rnd){\n    const F=this.FILMS;\n    if(key==='year'){ const years=[...new Set(F.map(f=>f.y))]; const y=this.shuf(years,rnd)[0]; return {lens:'A Year in Film',title:this.shuf(years,rnd)[0]+' & Around',items:this.shuf(F,rnd).slice(0,10).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='acclaimed'){ return {lens:'Hidden Gems',title:'Acclaimed & Unwatched',items:this.shuf(F.filter(f=>f.r>=8.1),rnd).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='spotlight'){ const d=this.shuf(this.directors().filter(x=>x.films.length>=2),rnd)[0]; return {lens:'Director Spotlight',title:d.d,items:d.films.map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='genre'){ const gs=[...new Set(F.map(f=>f.g))]; const g=this.shuf(gs,rnd)[0]; return {lens:'If You Like',title:g,items:this.shuf(F.filter(f=>f.g===g),rnd).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='studio'){ const st=this.shuf(this.studios().filter(x=>x.films.length>=2),rnd)[0]; return {lens:'From the Vault',title:st.s,items:this.shuf(st.films,rnd).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='decade'){ const decs=[...new Set(F.map(f=>Math.floor(f.y/10)*10))]; const dc=this.shuf(decs,rnd)[0]; return {lens:'Lost in Time',title:'Hidden in the '+dc+'s',items:this.shuf(F.filter(f=>Math.floor(f.y/10)*10===dc),rnd).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='critics'){ return {lens:'Top of the Library',title:\"Critics' Highest Rated\",items:F.slice().sort((a,b)=>b.r-a.r).slice(0,10).map(f=>this.mv(f)),layout:'A'}; }\n    if(key==='world'){ return {lens:'Passport',title:'Around the World',items:this.shuf(F.filter(f=>['Mosfilm','Toho','Daiei','Shochiku','CJ Entertainment','Jet Tone','Block 2','AB Svensk','Cineriz','Show East','1+2 Seisaku','Yang & His Gang'].includes(f.s)),rnd).map(f=>this.mv(f)),layout:'A'}; }\n    return {lens:'Explore',title:'Surprise Me',items:this.shuf(F,rnd).slice(0,10).map(f=>this.mv(f)),layout:'A'};\n  }\n\n  buildBase(){\n    const rnd=this.rng(this.state.seed);\n    const F=this.FILMS;\n    const shelves=[];\n    const cw=this.shuf(F,rnd).slice(0,6).map(f=>{ const v=this.mv(f); v.hasProgress=true; v.progress=(18+Math.floor(rnd()*64))+'%'; return v; });\n    shelves.push({lens:'Pick Up Where You Left Off',title:'Continue Watching',items:cw,layout:'A'});\n    // Up Next (episodes)\n    const upnext=this.shuf(this.SHOWS,rnd).slice(0,5).map((sh,i)=>{ const e=2+i; const ep=this.epsFor(sh,1)[e-1]||{title:'Episode '+e}; return { title:sh.t, meta:'S1 · E'+e+' · '+ep.title, bg:this.bgFor(sh.t+' '+e), showBottom:true, hasBadge:true, badge:'Up Next', hasProgress:true, progress:(20+i*12)+'%', z:'1',tf:'none',fx:'0 6px 18px rgba(0,0,0,.4)', onClick:()=>this.openDetail(sh,1) }; });\n    shelves.push({lens:'Next Episode',title:'Up Next',items:upnext,layout:'A'});\n    const nr=F.slice().sort((a,b)=>b.y-a.y).slice(0,12).map(f=>{ const v=this.mv(f); v.meta='Added '+(['2d','5d','1w','2w','3w','1mo'][this.hash(f.t)%6])+' ago'; return v; });\n    shelves.push({lens:'Just Added',title:'New Releases',items:nr,layout:'A'});\n    const dpick=this.shuf(this.directors().filter(x=>x.films.length>=3),rnd)[0];\n    shelves.push({lens:'Director Spotlight',title:'Spotlight on '+dpick.d,items:dpick.films.map(f=>this.mv(f)).concat(this.shuf(F.filter(f=>f.d!==dpick.d),rnd).slice(0,4).map(f=>this.mv(f))),layout:'A'});\n    const gpick=this.shuf([...new Set(F.map(f=>f.g))].filter(g=>F.filter(f=>f.g===g).length>=3),rnd)[0];\n    shelves.push({lens:'If You Like',title:gpick,items:this.shuf(F.filter(f=>f.g===gpick),rnd).map(f=>this.mv(f)),layout:'A'});\n    // Series\n    shelves.push({lens:'Television',title:'Series in the Library',items:this.shuf(this.SHOWS,rnd).map(sh=>this.sv(sh)),layout:'A'});\n    const spick=this.shuf(this.studios().filter(x=>x.films.length>=2),rnd)[0];\n    shelves.push({lens:'From the Vault',title:spick.s,items:this.shuf(spick.films,rnd).map(f=>this.mv(f)),layout:'A'});\n    const decs=[...new Set(F.map(f=>Math.floor(f.y/10)*10))].sort();\n    const decItems=decs.map((dc,i)=>{ const T=this.TILES[i%this.TILES.length]; return { big:dc+'s', sub:F.filter(f=>Math.floor(f.y/10)*10===dc).length+' films', bg:`linear-gradient(155deg, ${T[0]}, ${T[1]})`, tileFg:T[2], tileEyebrow:T[3], z:'1',tf:'none',fx:'0 6px 18px rgba(0,0,0,.4)', onClick:()=>this.openGridFor('Decade · '+dc+'s','Browse by Decade',F.filter(f=>Math.floor(f.y/10)*10===dc)) }; });\n    shelves.push({lens:'Browse by Decade',title:'Eras',items:decItems,layout:'C'});\n    const dirItems=this.directors().slice(0,12).map(x=>({ title:x.d, meta:x.films.length+' films', bg:this.dirBg(x.d), avatarBg:this.dirAvatar(x.d), initials:this.initials(x.d), hasAvatar:true, z:'1',tf:'none',fx:'0 6px 18px rgba(0,0,0,.4)', onClick:()=>this.openGridFor('Director · '+x.d,'Auteurs',x.films) }));\n    shelves.push({lens:'Auteurs',title:'Browse by Director',items:dirItems,layout:'B'});\n    const keys=this.shuf(['acclaimed','year','genre','studio','decade','critics','world','spotlight'],rnd);\n    for(let i=0;i<5;i++){ shelves.push(this.exploreGen(keys[i],this.rng(this.state.seed*97+i*13))); }\n    this.exKeys=keys; this.exCount=5;\n    return shelves;\n  }\n\n  addMore(){\n    if(!this.baseShelves||this.baseShelves.length>18) return;\n    const i=this.exCount; const allKeys=['year','genre','studio','decade','critics','world','acclaimed','spotlight'];\n    for(let k=0;k<2;k++){ this.baseShelves.push(this.exploreGen(allKeys[(i+k)%allKeys.length],this.rng(this.state.seed*131+(i+k)*29+this.state.tick))); }\n    this.exCount+=2; this.setState(s=>({tick:s.tick+1}));\n  }\n\n  openDetail(item, seasonN){ const isShow=!!item.seasons; this.detailItem=item; this.setState({screen:'detail', detailId:item.t, detailSeason:isShow?((seasonN||1)-1):0}); window.scrollTo({top:0}); }\n  openGridWith(title,lens,items){ this.setState({screen:'grid', grid:{ title, lens, count:items.length+' titles', bg:(items[0]&&items[0].bg)||this.bgFor(title), items }}); window.scrollTo({top:0}); }\n  openGridFor(title,lens,films){ this.openGridWith(title,lens,films.map(f=>this.mv(f))); }\n  openMovies(){ this.openGridFor('All Movies','The Library',this.FILMS.slice().sort((a,b)=>a.t.localeCompare(b.t))); }\n  openSeries(){ this.openGridWith('All Series','Television',this.SHOWS.map(sh=>this.sv(sh))); }\n  openGroups(){ this.openGridFor('Collections','Browse Groups',this.FILMS); }\n  goHome(){ this.setState({screen:'home'}); window.scrollTo({top:0}); }\n  back(){ this.setState({screen:'home'}); window.scrollTo({top:0}); }\n  reshuffle(){ this.setState(s=>({seed:s.seed+Math.floor(Math.random()*9000)+11, heroIdx:0}), ()=>{ this.baseShelves=this.buildBase(); this.heroItems=null; this.setState(s=>({tick:s.tick+1})); window.scrollTo({top:0}); }); }\n  toggleTv(){ this.setState(s=>({tvMode:!s.tvMode, focRow:0, focCol:0})); }\n\n  handleKey(e){\n    if(e.key==='Escape'&&this.state.tvMode){ this.setState({tvMode:false}); return; }\n    if(!this.state.tvMode||this.state.screen!=='home') return;\n    const sh=this.baseShelves||[];\n    const rowLen=(r)=> r===0?2:(sh[r-1]?sh[r-1].items.length:0);\n    let {focRow,focCol}=this.state;\n    if(e.key==='ArrowRight'){ focCol=Math.min(focCol+1,rowLen(focRow)-1); }\n    else if(e.key==='ArrowLeft'){ focCol=Math.max(focCol-1,0); }\n    else if(e.key==='ArrowDown'){ focRow=Math.min(focRow+1,sh.length); focCol=Math.min(focCol,rowLen(focRow)-1); }\n    else if(e.key==='ArrowUp'){ focRow=Math.max(focRow-1,0); focCol=Math.min(focCol,rowLen(focRow)-1); }\n    else if(e.key==='Enter'){ this.activate(); return; }\n    else return;\n    e.preventDefault();\n    this.setState({focRow,focCol},()=>this.scrollFocus());\n  }\n  activate(){\n    const {focRow,focCol}=this.state;\n    if(focRow===0){ if(this.heroItems&&this.heroItems[this.state.heroIdx]) this.openDetail(this.heroItems[this.state.heroIdx]); return; }\n    const sh=this.baseShelves[focRow-1]; const it=sh&&sh.items[focCol]; if(it&&it.onClick) it.onClick();\n  }\n  scrollFocus(){\n    const {focRow,focCol}=this.state;\n    if(focRow===0){ window.scrollTo({top:0,behavior:'smooth'}); return; }\n    const row=this.rowEls&&this.rowEls[focRow-1];\n    if(!row) return;\n    const card=row.children[focCol];\n    if(!card) return;\n    const rr=row.getBoundingClientRect(), cr=card.getBoundingClientRect();\n    row.scrollLeft=Math.max(0,row.scrollLeft+(cr.left-rr.left)-100);\n    const y=Math.max(0,window.scrollY+cr.top-window.innerHeight*0.42);\n    try{ window.scrollTo({top:y,behavior:'smooth'}); }catch(e){}\n    window.scrollTo(0,y);\n  }\n\n  detailVM(){\n    const it=this.detailItem; const isShow=!!it.seasons; const cast=(this.CAST[it.t]||[]).map(c=>({name:c.n,role:c.r,initials:this.initials(c.n),bg:this.dirAvatar(c.n)}));\n    const media=this.mediaInfo(it.t);\n    if(isShow){\n      const seasons=it.seasons.map((s,i)=>{ const active=i===this.state.detailSeason; return { label:'Season '+s.n, onClick:()=>this.setState({detailSeason:i}), bg:active?this.accent:'rgba(242,241,240,.05)', fg:active?'#14120f':'#cfc9bf', border:active?this.accent:'rgba(242,241,240,.18)' }; });\n      const cur=it.seasons[this.state.detailSeason]||it.seasons[0];\n      const eps=this.epsFor(it,cur.n);\n      const yr=it.ys+((it.ye&&it.ye!==it.ys)?' – '+it.ye:'');\n      return { isShow:true, title:it.t, bg:this.bgFor(it.t), dirLabel:'Series', playLabel:'Resume S1 E3',\n        hasTagline:!!it.tag, tagline:it.tag, cr:it.cr||'TV-14', yearLabel:yr, lengthLabel:it.seasons.length+' Season'+(it.seasons.length>1?'s':''), rating:it.r.toFixed(1),\n        hasCritic:false, hasEndsAt:false, blurb:it.ov,\n        genre:it.g, hasDirector:false, hasNetwork:true, network:it.net, studio:it.studio, hasStatus:true, status:it.ended?'Ended':'Continuing',\n        media, cast, hasCast:cast.length>0,\n        hasEpisodes:true, seasons, episodes:eps,\n        rows:[{title:'More Like This', items:this.shuf(this.SHOWS.filter(s=>s.t!==it.t),this.rng(this.hash(it.t))).slice(0,8).map(s=>this.sv(s))}] };\n    }\n    const same=this.FILMS.filter(x=>x.d===it.d&&x.t!==it.t);\n    const sim=this.shuf(this.FILMS.filter(x=>x.g===it.g&&x.t!==it.t),this.rng(this.hash(it.t))).slice(0,10);\n    const rows=[]; if(same.length) rows.push({title:'More from '+it.d,items:same.map(x=>this.mv(x))});\n    rows.push({title:'You Might Also Like',items:(sim.length?sim:this.shuf(this.FILMS,this.rng(this.hash(it.t))).slice(0,10)).map(x=>this.mv(x))});\n    return { isShow:false, title:it.t, bg:this.bgFor(it.t), dirLabel:'Directed by '+it.d, playLabel:'Play',\n      hasTagline:false, cr:this.MOVIE_CR[this.hash(it.t)%4], yearLabel:''+it.y, lengthLabel:this.fmt(it.m), rating:it.r.toFixed(1),\n      hasCritic:true, critic:this.crit(it.t)+'% critics', hasEndsAt:true, endsAt:this.endsAt(it.m),\n      blurb:it.b||(it.d+\"'s \"+it.y+' '+it.g.toLowerCase()+' is a cornerstone of the collection — essential viewing among the auteurs.'),\n      genre:it.g, hasDirector:true, director:it.d, hasNetwork:false, studio:it.s, hasStatus:false,\n      media, cast, hasCast:cast.length>0,\n      hasEpisodes:false, seasons:[], episodes:[], rows };\n  }\n\n  componentDidMount(){\n    this.baseShelves=this.buildBase();\n    this.rowEls={}; this.secEls={};\n    this.heroTimer=setInterval(()=>{ if(this.state.screen==='home'&&!this.state.tvMode) this.setState(s=>({heroIdx:(s.heroIdx+1)%(this.heroItems?this.heroItems.length:1)})); },9000);\n    this.onScroll=()=>{ if(this.state.screen!=='home')return; if(window.innerHeight+window.scrollY>document.body.offsetHeight-900) this.addMore(); };\n    window.addEventListener('scroll',this.onScroll,{passive:true});\n    this.onKey=(e)=>this.handleKey(e);\n    window.addEventListener('keydown',this.onKey);\n    this.setState(s=>({tick:s.tick+1}));\n  }\n  componentWillUnmount(){ clearInterval(this.heroTimer); window.removeEventListener('scroll',this.onScroll); window.removeEventListener('keydown',this.onKey); }\n\n  renderVals(){\n    const S=this.state;\n    const sh=this.baseShelves||[];\n    this.heroItems=this.heroItems||this.shuf(this.FILMS.filter(f=>f.r>=8.2),this.rng(S.seed*3+1)).slice(0,5);\n    const hf=this.heroItems[S.heroIdx%this.heroItems.length]||this.FILMS[0];\n    const heroFocP=S.tvMode&&S.focRow===0&&S.focCol===0;\n    const heroFocI=S.tvMode&&S.focRow===0&&S.focCol===1;\n    const hero={\n      title:hf.t, lens:'Spotlight', metaLine:hf.y+'  ·  '+hf.g+'  ·  '+this.fmt(hf.m)+'  ·  ★ '+hf.r.toFixed(1),\n      blurb:hf.b||(hf.d+\"'s \"+hf.y+' masterwork — among the most celebrated films in the collection.'),\n      bg:this.bgFor(hf.t), onPlay:()=>this.openDetail(hf), onInfo:()=>this.openDetail(hf),\n      playTf:heroFocP?'scale(1.05)':'none', playFx:heroFocP?'0 0 0 3px '+this.accent+', 0 12px 30px rgba(0,0,0,.5)':'none',\n      infoTf:heroFocI?'scale(1.05)':'none', infoFx:heroFocI?'0 0 0 3px '+this.accent:'none'\n    };\n    const heroDots=this.heroItems.map((f,i)=>({ bg:i===(S.heroIdx%this.heroItems.length)?this.accent:'rgba(242,241,240,.28)', onClick:()=>this.setState({heroIdx:i}) }));\n\n    const shelvesV=sh.map((shelf,si)=>{\n      const items=shelf.items.map((it,ci)=>{\n        const foc=S.tvMode&&S.focRow-1===si&&S.focCol===ci;\n        return Object.assign({},it,{ tf:foc?'scale(1.07)':'none', fx:foc?'0 0 0 3px '+this.accent+', 0 20px 44px rgba(0,0,0,.6)':'0 6px 18px rgba(0,0,0,.4)', z:foc?'40':'1' });\n      });\n      return { idx:si, lens:shelf.lens, hasLens:!!shelf.lens, title:shelf.title, items,\n        isA:shelf.layout==='A', isB:shelf.layout==='B', isC:shelf.layout==='C',\n        onAll:()=>{ const films=shelf.items.map(x=>x._f).filter(Boolean); const shows=shelf.items.map(x=>x._show).filter(Boolean); if(shows.length) this.openGridWith(shelf.title,shelf.lens||'Shelf',shelf.items.slice()); else this.openGridFor(shelf.title,shelf.lens||'Shelf',films.length?films:this.FILMS); },\n        secRef:(el)=>{ if(this.secEls)this.secEls[si]=el; }, rowRef:(el)=>{ if(this.rowEls)this.rowEls[si]=el; } };\n    });\n\n    const tvOn=S.tvMode;\n    const blank={rows:[],seasons:[],episodes:[],cast:[],media:{}};\n    // Reload/hot-reload safety: re-resolve the detail item from its id if the instance field was lost.\n    if(S.screen==='detail'&&!this.detailItem&&S.detailId){ this.detailItem=this.FILMS.find(f=>f.t===S.detailId)||this.SHOWS.find(s=>s.t===S.detailId)||null; }\n    const showDetail=S.screen==='detail'&&!!this.detailItem;\n    const showGrid=S.screen==='grid'&&!!S.grid;\n    return {\n      accent:this.accent,\n      isHome:!showDetail&&!showGrid, isGrid:showGrid, isDetail:showDetail,\n      hero, heroDots, shelvesV, grid:S.grid||{items:[]},\n      detail:showDetail?this.detailVM():blank,\n      tvMode:tvOn, tvBg:tvOn?this.accent:'rgba(242,241,240,.05)', tvFg:tvOn?'#14120f':'#F2F1F0', tvBorder:tvOn?this.accent:'rgba(242,241,240,.18)',\n      goHome:()=>this.goHome(), back:()=>this.back(), reshuffle:()=>this.reshuffle(), toggleTv:()=>this.toggleTv(),\n      openMovies:()=>this.openMovies(), openSeries:()=>this.openSeries(), openGroups:()=>this.openGroups()\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
