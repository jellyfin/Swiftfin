name: "TestFlight ✈️"

on:
  schedule:
    # 1st and 15th of every month at 12pm EST / 1pm EDT (17:00 UTC)
    - cron: '0 17 1,15 * *'
  repository_dispatch:
    types: [testflight]
  workflow_dispatch:

jobs:
  build:
    name: "TestFlight ✈️"
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: git Checkout
      if: ${{ github.event.client_payload.hasCheckoutCommit }}
      run: |
        git checkout ${{ github.event.client_payload.commitSHA }}

    - name: Determine Next Version
      id: version
      if: github.event_name != 'repository_dispatch'
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get latest release tag (fallback to 1.0.0 if none exists)
        LATEST_TAG=$(gh release view --json tagName -q '.tagName' 2>/dev/null || echo "1.0.0")
        echo "Latest release tag: $LATEST_TAG"

        VERSION="$LATEST_TAG"

        # Extract major.minor (up to 2 digits each side of first decimal)
        # This is to prevent weird number with minor versions like 1.0.1, 1.4.1, etc.
        MAJOR=$(echo "$VERSION" | sed -E 's/^([0-9]{1,2})\..*/\1/')
        MINOR=$(echo "$VERSION" | sed -E 's/^[0-9]{1,2}\.([0-9]{1,2}).*/\1/')

        # Increment minor version
        NEXT_VERSION="${MAJOR}.$((MINOR + 1))"
        echo "Next TestFlight version: $NEXT_VERSION"
        echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT

    - name: Install SwiftGen
      run: brew install swiftgen

    - name: Update Carthage
      run: carthage update --use-xcframeworks --cache-builds

    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: "CI_PASSWORD"
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      run: |
        # create variables
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # import certificate and provisioning profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # apply provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        sudo mkdir -p /Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
        sudo cp $PP_PATH /Library/MobileDevice/Provisioning\ Profiles

    - name: Build and Upload to TestFlight
      env:
        FL_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        FL_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
        FL_KEY_CONTENTS: ${{ secrets.APP_STORE_KEY_CONTENTS }}
        FL_CODE_SIGN_64: ${{ secrets.CODE_SIGN_64 }}
        FL_PROFILE_NAME_64: ${{ secrets.PROFILE_NAME_64 }}
        PAYLOAD_SCHEME: ${{ github.event.client_payload.scheme }}
        PAYLOAD_XCODE_VERSION: ${{ github.event.client_payload.xcodeVersion }}
        PAYLOAD_BUILD: ${{ github.event.client_payload.build }}
        PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        PAYLOAD_BRANCH: ${{ github.event.client_payload.branch }}
        AUTO_VERSION: ${{ steps.version.outputs.version }}
      run: |
        # Required parameters
        ARGS="keyID:$FL_KEY_ID issuerID:$FL_ISSUER_ID keyContents:$FL_KEY_CONTENTS"
        ARGS="$ARGS codeSign64:$FL_CODE_SIGN_64 profileName64:$FL_PROFILE_NAME_64"

        # Scheme parameter
        # Falls back to Swiftfin iOS if not provided
        ARGS="$ARGS scheme:${PAYLOAD_SCHEME:-Swiftfin iOS}"

        # Build: payload or auto-increment
        ARGS="$ARGS build:${PAYLOAD_BUILD:-auto}"

        # Version parameter
        # Manually make a version OR allow it to auto-increment
        ARGS="$ARGS version:${PAYLOAD_VERSION:-$AUTO_VERSION}"

        # Optional parameters
        if [ -n "$PAYLOAD_XCODE_VERSION" ]; then
          ARGS="$ARGS xcodeVersion:$PAYLOAD_XCODE_VERSION"
        fi

        if [ -n "$PAYLOAD_BRANCH" ]; then
          ARGS="$ARGS branch:$PAYLOAD_BRANCH"
        fi

        sudo fastlane testFlightLane $ARGS
