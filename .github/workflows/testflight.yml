name: "TestFlight ✈️"

on:
  schedule:
    # 1st of every month at 12pm EST / 1pm EDT (17:00 UTC)
    - cron: '0 17 1 * *'
  repository_dispatch:
    types: [testflight]
  workflow_dispatch:

jobs:
  build:
    name: "TestFlight ✈️"
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v6
      with:
        ref: ${{ github.event.client_payload.ref || 'main' }}
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0

    - name: git Checkout
      if: ${{ github.event.client_payload.hasCheckoutCommit }}
      run: |
        git checkout ${{ github.event.client_payload.commitSHA }}

    - name: Install SwiftGen
      run: brew install swiftgen

    - name: Update Carthage
      run: carthage update --use-xcframeworks --cache-builds

    - name: Install the Apple certificate and provisioning profile
      env:
        BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
        BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
        KEYCHAIN_PASSWORD: "CI_PASSWORD"
        P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      run: |
        CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
        PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
        KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

        # import certificate and provisioning profile from secrets
        echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
        echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

        # create temporary keychain
        security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

        # import certificate to keychain
        security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
        security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
        security list-keychain -d user -s $KEYCHAIN_PATH

        # apply provisioning profile
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        sudo mkdir -p /Library/MobileDevice/Provisioning\ Profiles
        cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles
        sudo cp $PP_PATH /Library/MobileDevice/Provisioning\ Profiles

    - name: Generate Changelog
      id: changelog
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        # Get the date of the latest release to filter PRs merged after it
        RELEASE_DATE=$(gh release view --json publishedAt -q '.publishedAt' 2>/dev/null || echo "")

        if [ -n "$RELEASE_DATE" ]; then
          echo "Finding 'release highlight' PRs merged after $RELEASE_DATE"
          LOG=$(gh pr list \
            --state merged \
            --label "release highlight" \
            --search "merged:>=$RELEASE_DATE" \
            --json title \
            --jq '.[].title' | sed 's/^/- /')
        fi

        # Fallback if no release found or no PR with "Release Highlight" tag
        if [ -z "$LOG" ]; then
          LOG="General performance changes, fixes, and localization changes."
        fi

        # Write to multiline output
        {
          echo "changelog<<CHANGELOG_EOF"
          echo "$LOG"
          echo "CHANGELOG_EOF"
        } >> $GITHUB_OUTPUT

    - name: Build and Upload to TestFlight
      env:
        FL_KEY_ID: ${{ secrets.APP_STORE_KEY_ID }}
        FL_ISSUER_ID: ${{ secrets.APP_STORE_ISSUER_ID }}
        FL_KEY_CONTENTS: ${{ secrets.APP_STORE_KEY_CONTENTS }}
        FL_CODE_SIGN_64: ${{ secrets.CODE_SIGN_64 }}
        FL_PROFILE_NAME_64: ${{ secrets.PROFILE_NAME_64 }}
        PAYLOAD_SCHEME: ${{ github.event.client_payload.scheme }}
        PAYLOAD_XCODE_VERSION: ${{ github.event.client_payload.xcodeVersion }}
        PAYLOAD_BUILD: ${{ github.event.client_payload.build }}
        PAYLOAD_VERSION: ${{ github.event.client_payload.version }}
        AUTO_CHANGELOG: ${{ steps.changelog.outputs.changelog }}
      run: |
        ARGS="keyID:$FL_KEY_ID issuerID:$FL_ISSUER_ID keyContents:$FL_KEY_CONTENTS"
        ARGS="$ARGS codeSign64:$FL_CODE_SIGN_64 profileName64:$FL_PROFILE_NAME_64"

        ARGS="$ARGS scheme:${PAYLOAD_SCHEME:-Swiftfin iOS}"

        if [ -n "$PAYLOAD_BUILD" ]; then
          ARGS="$ARGS build:$PAYLOAD_BUILD"
        fi

        if [ -n "$PAYLOAD_VERSION" ]; then
          ARGS="$ARGS version:$PAYLOAD_VERSION"
        fi

        if [ -n "$PAYLOAD_XCODE_VERSION" ]; then
          ARGS="$ARGS xcodeVersion:$PAYLOAD_XCODE_VERSION"
        fi

        CHANGELOG_FILE=$(mktemp)
        echo "$AUTO_CHANGELOG" > "$CHANGELOG_FILE"
        ARGS="$ARGS changelogFile:$CHANGELOG_FILE"

        sudo fastlane testFlightLane $ARGS
